<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Narozniak gout caramel candy wrapper mockup</title>
  <desc id="desc">A caramel candy wrapper mockup with warm red and yellow packaging and the text Narozniak and gout caramel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f0e8"/>
      <stop offset="1" stop-color="#ded2c1"/>
    </linearGradient>
    <linearGradient id="wrapper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8d1717"/>
      <stop offset="0.18" stop-color="#d8211f"/>
      <stop offset="0.5" stop-color="#f5c12b"/>
      <stop offset="0.82" stop-color="#d8211f"/>
      <stop offset="1" stop-color="#8d1717"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.22" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="caramel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b76a25"/>
      <stop offset="0.5" stop-color="#e09a3f"/>
      <stop offset="1" stop-color="#7a3d16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="38" stdDeviation="34" flood-color="#5f3c24" flood-opacity="0.28"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <clipPath id="bodyClip">
      <rect x="270" y="355" width="995" height="276" rx="62"/>
    </clipPath>
  </defs>

  <rect width="1536" height="1024" fill="url(#bg)"/>
  <ellipse cx="768" cy="707" rx="575" ry="105" fill="#6e4a2d" opacity="0.13" filter="url(#soft)"/>

  <g transform="rotate(-8 768 512)" filter="url(#shadow)">
    <path d="M190 419 L306 352 L306 634 L190 573 C151 553 151 441 190 419Z" fill="#c81d1c"/>
    <path d="M1346 419 L1230 352 L1230 634 L1346 573 C1385 553 1385 441 1346 419Z" fill="#c81d1c"/>
    <path d="M192 420 C237 454 259 492 192 573" fill="none" stroke="#f1b82d" stroke-width="20" stroke-linecap="round" opacity="0.82"/>
    <path d="M1344 420 C1299 454 1277 492 1344 573" fill="none" stroke="#f1b82d" stroke-width="20" stroke-linecap="round" opacity="0.82"/>

    <rect x="270" y="355" width="995" height="276" rx="62" fill="url(#wrapper)"/>
    <g clip-path="url(#bodyClip)">
      <rect x="304" y="369" width="928" height="58" fill="url(#shine)" opacity="0.55"/>
      <path d="M270 458 C410 391 531 394 670 458 C811 523 955 525 1265 451 L1265 355 L270 355Z" fill="#fff7cf" opacity="0.18"/>
      <path d="M270 598 C410 555 538 560 675 598 C816 637 1005 646 1265 586 L1265 631 L270 631Z" fill="#611010" opacity="0.18"/>
      <circle cx="426" cy="485" r="116" fill="#f7d74b" opacity="0.22"/>
      <circle cx="1111" cy="484" r="116" fill="#f7d74b" opacity="0.22"/>
      <path d="M290 363 L384 631" stroke="#7c1515" stroke-width="24" opacity="0.22"/>
      <path d="M1148 354 L1244 628" stroke="#7c1515" stroke-width="24" opacity="0.22"/>
    </g>

    <rect x="390" y="407" width="756" height="166" rx="54" fill="#f8cf38" stroke="#fff3a1" stroke-width="10"/>
    <path d="M428 489 C512 411 635 408 720 478 C773 522 836 532 906 488 C984 438 1083 453 1121 510" fill="none" stroke="#e43328" stroke-width="20" stroke-linecap="round" opacity="0.9"/>

    <text x="768" y="518"
          text-anchor="middle"
          font-family="Arial Rounded MT Bold, Trebuchet MS, Arial, sans-serif"
          font-size="112"
          font-weight="900"
          letter-spacing="0"
          fill="#d8201f"
          stroke="#ffffff"
          stroke-width="9"
          paint-order="stroke fill">Narozniak</text>

    <g transform="translate(922 547)">
      <path d="M0 0 C56 -24 133 -20 183 10 C144 61 54 72 0 0Z" fill="url(#caramel)"/>
      <path d="M31 11 C75 -3 121 1 151 18" fill="none" stroke="#ffd68a" stroke-width="10" stroke-linecap="round" opacity="0.58"/>
    </g>

    <rect x="514" y="576" width="322" height="58" rx="29" fill="#8f1717" opacity="0.96"/>
    <text x="675" y="616"
          text-anchor="middle"
          font-family="Trebuchet MS, Arial, sans-serif"
          font-size="36"
          font-weight="800"
          letter-spacing="0"
          fill="#fff2ad">gout caramel</text>

    <path d="M333 372 C365 405 367 584 333 621" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
    <path d="M1203 372 C1171 405 1169 584 1203 621" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
